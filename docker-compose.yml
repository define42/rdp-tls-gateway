services:
  gateway:
    build:
      context: ./
      # Build with host networking so `go mod download`/`go build` can reach the
      # module proxy. The default BuildKit network has no working outbound route
      # in this environment (IPv6-only resolution fails), breaking the build.
      network: host
    restart: always
      #    privileged: true
    environment:
      # Pin the data root to the bind-mounted /data; the binary's built-in
      # default is /var/lib/libvirt/devbox-gateway for native (RPM) installs.
      - DATA_ROOT_DIR=/data
      - BASE_IMAGE_DIR=/data/baseimages
    ports:
      - "443:443"
    volumes:
      - /var/run/libvirt:/var/run/libvirt
      - /data/:/data/
    networks:
      virbr0-net:
        ipv4_address: 192.168.122.254
      app-net:           # host-access + port publishing

  ldap:
    image: glauth/glauth
    container_name: ldap
    restart: always
    ports:
      - "389:389"
    volumes:
      - ./testldap/default-config.cfg:/app/config/config.cfg
      - ./testldap/key.pem:/app/config/key.pem
      - ./testldap/cert.pem:/app/config/cert.pem
    networks:
      app-net:
networks:
  virbr0-net:
    driver: macvlan
    driver_opts:
      parent: virbr0
    ipam:
      config:
        - subnet: 192.168.122.0/24
          gateway: 192.168.122.1
  app-net:
    driver: bridge
