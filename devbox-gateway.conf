# devbox-gateway configuration file.
#
# The gateway reads this file on startup (default
# /etc/devbox-gateway/devbox-gateway.conf, override with the CONFIG_FILE
# environment variable). Each line is KEY=VALUE; '#' starts a comment.
#
# Every setting below is optional; the value shown is the built-in default. A
# matching environment variable, if set, takes precedence over the file value.
# Uncomment and edit the lines you want to change, then restart the service:
#   systemctl restart devbox-gateway
#
# See https://github.com/define42/devbox-gateway for full documentation.

# --- Listener / TLS (front side, facing clients) ---
#LISTEN_ADDR=:443
#CERT_FILE=
#KEY_FILE=
#FRONT_DOMAIN=desktop.local.gd
#TIMEOUT=10s

# --- SSH reverse tunnel (publish a NAT'd gateway via a public relay) ---
# When SSH_TUNNEL_ENABLE=true the gateway does NOT bind LISTEN_ADDR locally.
# Instead it dials out to a public relay over SSH and asks the relay to listen
# on SSH_TUNNEL_REMOTE_ADDR; the relay forwards every accepted connection back
# down the tunnel. This lets a gateway behind NAT publish its :443 service on a
# reachable host without any inbound firewall rules.
#
# SSH_TUNNEL_SERVER must be a literal IP:port (not a hostname) so DNS cannot
# redirect the outbound dial; the relay's host key is pinned via the
# SSH_TUNNEL_KNOWN_HOSTS file. On the relay, sshd must allow the forwarded port
# to be reachable from outside localhost, i.e. set "GatewayPorts yes" (or
# "clientspecified") in sshd_config; otherwise -R :443 binds to loopback only.
# If the tunnel drops, the process exits non-fatally so systemd restarts it.
#SSH_TUNNEL_ENABLE=false
#SSH_TUNNEL_SERVER=
#SSH_TUNNEL_USER=
#SSH_TUNNEL_PRIVATE_KEY=/etc/devbox-gateway/ssh/id_ed25519
#SSH_TUNNEL_PRIVATE_KEY_PASSPHRASE=
#SSH_TUNNEL_KNOWN_HOSTS=/etc/devbox-gateway/ssh/known_hosts
#SSH_TUNNEL_REMOTE_ADDR=:443
#SSH_TUNNEL_KEEPALIVE_INTERVAL=15s
#SSH_TUNNEL_KEEPALIVE_TIMEOUT=10s

# --- ACME / Let's Encrypt (automatic public certificates) ---
#ACME_ENABLE=false
#ACME_EMAIL=
#ACME_CA=

# --- Storage / libvirt ---
#DATA_ROOT_DIR=/var/lib/libvirt/devbox-gateway
#VIRT_STORAGE_POOL_NAME=desktop
# Directory of selectable base VDI images (.img/.qcow2/.raw); must contain at
# least one image at boot. Empty -> <DATA_ROOT_DIR>/baseimages
#BASE_IMAGE_DIR=

# --- LDAP authentication ---
# Set LDAP_URL empty (LDAP_URL=) to disable LDAP and use LOCAL_USER_SHA256 only.
#LDAP_URL=ldaps://ldap:389
#LDAP_BASE_DN=dc=glauth,dc=com
#LDAP_USER_FILTER=(mail=%s)
#LDAP_USER_DOMAIN=@example.com
#LDAP_STARTTLS=false
#LDAP_SKIP_TLS_VERIFY=true
#LOGIN_RATE_LIMIT_MAX_ATTEMPTS=5
#LOGIN_RATE_LIMIT_WINDOW=5m
#LOGIN_RATE_LIMIT_LOCKOUT=15m

# --- Local users (checked before LDAP, no directory required) ---
# A ';'-delimited list of sha256("username:password") hex digests. Generate one
# with:  printf '%s:%s' alice 's3cret' | sha256sum
#LOCAL_USER_SHA256=

# --- RDP session hardening ---
#RDP_DISABLE_CLIPBOARD=false
#RDP_DISABLE_DRIVES=false

# --- SNI routing secret (auto-generated and persisted when empty) ---
#SNI_HASH_SECRET=

# --- Debugging ---
# Verbose, per-connection logging. When true the gateway logs every accepted
# front connection (HTTPS vs RDP, with source address) and every HTTP/WebSocket
# request (type, source address, method, path). Useful for tracing connectivity
# through the SSH reverse tunnel. Noisy; leave off in normal operation.
#DEBUG_CONNECTIONS=false
